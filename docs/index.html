<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chaotic Dimensions Wiki</title>
  <meta id="meta-description" name="description" content="Wiki oficial do Chaotic Dimensions com catalogo de itens, crafting, progressao e base pronta para crescer.">
  <meta name="theme-color" content="#0d1118">
  <link rel="icon" type="image/png" href="./assets/images/favicon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="wiki-app">
    <header class="topbar" id="topbar"></header>

    <div class="wiki-layout">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="main-content">
        <section class="section-block" id="overview"></section>
        <section class="section-block" id="progression"></section>
        <section class="section-block" id="catalog"></section>
        <section class="section-block" id="crafting"></section>
        <section class="section-block" id="community"></section>
        <section class="section-block" id="admin"></section>
      </main>
    </div>

    <footer class="site-footer" id="site-footer"></footer>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay" hidden></div>

  <noscript>
    <div class="noscript-banner">
      Esta wiki precisa de JavaScript para trocar idioma, pesquisar conteudo e navegar nas secoes.
    </div>
  </noscript>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
