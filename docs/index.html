<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chaotic Dimensions Wiki</title>
  <meta id="meta-description" name="description" content="Wiki oficial do mod Chaotic Dimensions com visual cosmico, guia de download, boss guide e catalogo de itens.">
  <meta name="theme-color" content="#12071d">
  <link rel="icon" type="image/png" href="./assets/images/favicon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="site-shell">
    <aside class="sidebar glass-card" id="sidebar"></aside>

    <div class="content-shell">
      <header class="mobile-bar glass-card">
        <button class="mobile-nav-toggle" id="mobile-nav-toggle" type="button" aria-label="Abrir menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a class="mobile-brand" id="mobile-brand" href="#home">Chaotic Dimensions</a>
      </header>

      <main class="main-content">
        <section class="hero-section" id="home"></section>
        <section class="section-block" id="download"></section>
        <section class="section-block" id="wiki"></section>
        <section class="section-block" id="frontier"></section>
        <section class="section-block" id="bosses"></section>
        <section class="section-block" id="roadmap"></section>
      </main>

      <footer class="site-footer glass-card" id="site-footer"></footer>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay" hidden></div>

  <noscript>
    <div class="noscript-banner">
      Esta wiki precisa de JavaScript habilitado para trocar idioma, pesquisar itens e navegar pelo catalogo.
    </div>
  </noscript>

  <script type="module" src="./app.js"></script>

</html>
